<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Babylon — Dev Harness</title>
  <style>
    :root {
      --bg:       #1e1e2e;
      --surface:  #2a2a3d;
      --border:   #3a3a55;
      --text:     #cdd6f4;
      --muted:    #6c7086;
      --green:    #a6e3a1;
      --red:      #f38ba8;
      --yellow:   #f9e2af;
      --blue:     #89b4fa;
      --accent:   #cba6f7;
      --mono:     "Cascadia Code", "Fira Code", Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: .02em; }
    .badge {
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge.disconnected { background: #3a2030; color: var(--red); }
    .badge.connecting   { background: #3a3010; color: var(--yellow); }
    .badge.connected    { background: #1a3020; color: var(--green); }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto auto 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Panels ── */
    .panel {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .panel-body { padding: 14px 16px; overflow-y: auto; flex: 1; }

    /* ── Config panel ── */
    #config { grid-row: 1; grid-column: 1; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .field label { font-size: .75rem; color: var(--muted); }
    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      padding: 6px 10px;
      width: 100%;
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      padding: 7px 16px;
      transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #start-btn  { background: var(--green);  color: #1a2a1a; }
    #stop-btn   { background: var(--red);    color: #2a1a1a; }
    #add-mesh-btn { background: var(--blue); color: #1a2030; flex: 1; }

    /* ── Scene controls panel ── */
    #scene-controls { grid-row: 2; grid-column: 1; }

    /* ── Behaviors panel ── */
    #behaviors { grid-row: 3; grid-column: 1; }
    .behavior-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 10px 12px;
    }
    .behavior-ns {
      font-size: .75rem;
      color: var(--accent);
      font-family: var(--mono);
      margin-bottom: 6px;
    }
    .resource-tag {
      display: inline-block;
      background: #2a3040;
      border: 1px solid var(--blue);
      color: var(--blue);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: .7rem;
      padding: 2px 7px;
      margin: 2px 2px 4px 0;
    }
    .tool-tag {
      display: inline-block;
      background: #302a40;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: .7rem;
      padding: 2px 7px;
      margin: 2px 2px 4px 0;
    }
    .tag-group-label {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 5px 0 3px;
    }

    /* ── Log panel ── */
    #log {
      grid-row: 1 / 4;
      grid-column: 2;
      border-right: none;
    }
    #log-output {
      font-family: var(--mono);
      font-size: .78rem;
      line-height: 1.6;
    }
    .log-line { padding: 1px 0; }
    .log-line .ts { color: var(--muted); user-select: none; }
    .log-line.info  .msg { color: var(--text); }
    .log-line.ok    .msg { color: var(--green); }
    .log-line.warn  .msg { color: var(--yellow); }
    .log-line.error .msg { color: var(--red); }
    .log-line.dim   .msg { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>MCP Babylon — Dev Harness</h1>
  <span id="status-badge" class="badge disconnected">Disconnected</span>
</header>

<main>
  <!-- ── Config ────────────────────────────────────── -->
  <section class="panel" id="config">
    <div class="panel-title">Connection</div>
    <div class="panel-body">
      <div class="field">
        <label for="ws-url">Tunnel provider URL</label>
        <input type="text" id="ws-url" value="ws://localhost:3000/provider" />
      </div>
      <div class="field">
        <label for="server-name">Server name</label>
        <input type="text" id="server-name" value="Babylon Dev Scene" />
      </div>
      <div class="btn-row">
        <button id="start-btn">▶ Start</button>
        <button id="stop-btn" disabled>■ Stop</button>
      </div>
    </div>
  </section>

  <!-- ── Scene controls (runtime mesh spawning) ────── -->
  <section class="panel" id="scene-controls">
    <div class="panel-title">Scene Controls</div>
    <div class="panel-body">
      <div class="field">
        <label for="mesh-name-input">New mesh name</label>
        <input type="text" id="mesh-name-input" placeholder="e.g. CubeMesh" />
      </div>
      <div class="btn-row">
        <button id="add-mesh-btn" disabled>+ Add Mesh</button>
      </div>
      <p style="margin-top:10px;font-size:.72rem;color:var(--muted)">
        Spawns a new mesh resource at runtime and notifies the connected MCP client
        via <code style="font-family:var(--mono)">notifications/resources/list_changed</code>.
      </p>
    </div>
  </section>

  <!-- ── Registered behaviors ──────────────────────── -->
  <section class="panel" id="behaviors">
    <div class="panel-title">Behaviors &amp; Tools</div>
    <div class="panel-body" id="behaviors-body">
      <p style="color:var(--muted);font-size:.8rem">Start the server to see registered behaviors.</p>
    </div>
  </section>

  <!-- ── Log ───────────────────────────────────────── -->
  <section class="panel" id="log">
    <div class="panel-title">Log</div>
    <div class="panel-body" id="log-output"></div>
  </section>
</main>

<!-- UMD bundle produced by `npm run bundle` -->
<script src="/bundle/mcp-server.js"></script>
<script>
"use strict";

// =============================================================================
// Logging
// =============================================================================

const logEl = document.getElementById("log-output");

function log(msg, level = "info") {
  const ts  = new Date().toLocaleTimeString("en", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
  const div = document.createElement("div");
  div.className = `log-line ${level}`;
  div.innerHTML = `<span class="ts">${ts}</span>  <span class="msg">${escHtml(msg)}</span>`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// =============================================================================
// Status badge
// =============================================================================

const badgeEl = document.getElementById("status-badge");

function setStatus(state) {
  badgeEl.className = `badge ${state}`;
  badgeEl.textContent = { disconnected: "Disconnected", connecting: "Connecting…", connected: "Connected" }[state] ?? state;
}

// =============================================================================
// Mock behaviors
// =============================================================================

/**
 * A simulated Babylon.js mesh behavior.
 * Exposes one resource and two tools so you can see real MCP traffic.
 */
function makeMeshBehavior(meshName) {
  const uri = `mesh://scene/${meshName}`;

  const instance = {
    uri,
    getResource: () => ({
      uri,
      name: meshName,
      description: `Simulated Babylon.js mesh — ${meshName}`,
      mimeType: "application/json",
    }),
    readResource: async () => ({
      uri,
      text: JSON.stringify({
        name: meshName,
        position: { x: 0, y: 0, z: 0 },
        scaling:  { x: 1, y: 1, z: 1 },
        isVisible: true,
        vertexCount: 24,
      }, null, 2),
    }),
    getTools: () => [
      {
        name: "set_position",
        description: "Move a mesh to a new world-space position.",
        inputSchema: {
          type: "object",
          properties: {
            uri: { type: "string", description: "Target mesh URI, e.g. mesh://scene/BoxMesh" },
            x: { type: "number" },
            y: { type: "number" },
            z: { type: "number" },
          },
          required: ["uri", "x", "y", "z"],
        },
      },
      {
        name: "set_visibility",
        description: "Show or hide a mesh.",
        inputSchema: {
          type: "object",
          properties: {
            uri: { type: "string", description: "Target mesh URI, e.g. mesh://scene/SphereMesh" },
            visible: { type: "boolean" },
          },
          required: ["uri", "visible"],
        },
      },
    ],
    callTool: async (name, args) => {
      if (name === "set_position") {
        log(`  ${meshName}.position ← (${args.x}, ${args.y}, ${args.z})`, "ok");
        return { applied: true, mesh: meshName, position: args };
      }
      if (name === "set_visibility") {
        log(`  ${meshName}.isVisible ← ${args.visible}`, "ok");
        return { applied: true, mesh: meshName, isVisible: args.visible };
      }
      throw new Error(`Unknown tool: ${name}`);
    },
  };

  return {
    namespace:   "mesh",
    uriTemplate: "mesh://scene/{meshName}",
    name:        "Babylon Mesh",
    description: "A named mesh in the active Babylon.js scene.",
    mimeType:    "application/json",
    attach: () => instance,
  };
}

/** A camera behavior. */
function makeCameraBehavior() {
  const uri = "camera://scene/main";
  const instance = {
    uri,
    getResource: () => ({
      uri,
      name: "Main Camera",
      description: "Active Babylon.js camera",
      mimeType: "application/json",
    }),
    readResource: async () => ({
      uri,
      text: JSON.stringify({ type: "ArcRotateCamera", alpha: 0, beta: 1.2, radius: 10 }, null, 2),
    }),
    getTools: () => [
      {
        name: "set_target",
        description: "Point the camera at a world-space coordinate.",
        inputSchema: {
          type: "object",
          properties: {
            uri: { type: "string", description: "Camera URI, e.g. camera://scene/main" },
            x: { type: "number" },
            y: { type: "number" },
            z: { type: "number" },
          },
          required: ["uri", "x", "y", "z"],
        },
      },
    ],
    callTool: async (name, args) => {
      if (name === "set_target") {
        log(`  camera.target ← (${args.x}, ${args.y}, ${args.z})`, "ok");
        return { applied: true, target: args };
      }
      throw new Error(`Unknown tool: ${name}`);
    },
  };
  return {
    namespace:   "camera",
    uriTemplate: "camera://scene/{cameraName}",
    name:        "Babylon Camera",
    description: "A named camera in the active Babylon.js scene.",
    mimeType:    "application/json",
    attach: () => instance,
  };
}

// =============================================================================
// Behaviors registry
// =============================================================================

const behaviors = [
  makeMeshBehavior("BoxMesh"),
  makeMeshBehavior("SphereMesh"),
  makeCameraBehavior(),
];

let dynamicMeshCounter = 0;

// =============================================================================
// Behaviors panel
// =============================================================================

function renderBehaviors() {
  const body = document.getElementById("behaviors-body");
  body.innerHTML = "";

  // Group instances by behavior namespace
  const groups = {};
  for (const b of behaviors) {
    const inst = b.attach(null);
    (groups[b.namespace] ??= []).push(inst);
  }

  for (const [ns, instances] of Object.entries(groups)) {
    const card = document.createElement("div");
    card.className = "behavior-card";
    card.innerHTML = `<div class="behavior-ns">${escHtml(ns)}</div>`;

    for (const inst of instances) {
      const res = inst.getResource();
      const resDiv = document.createElement("div");
      resDiv.innerHTML = `<div class="tag-group-label">resource</div><span class="resource-tag">${escHtml(res.uri)}</span>`;
      card.appendChild(resDiv);

      const tools = inst.getTools();
      if (tools.length) {
        const toolDiv = document.createElement("div");
        toolDiv.innerHTML = `<div class="tag-group-label">tools</div>`;
        for (const t of tools) {
          const span = document.createElement("span");
          span.className = "tool-tag";
          span.textContent = t.name;
          toolDiv.appendChild(span);
        }
        card.appendChild(toolDiv);
      }
    }
    body.appendChild(card);
  }
}

// Render immediately so behaviors are visible before connecting.
renderBehaviors();

// =============================================================================
// Server lifecycle
// =============================================================================

const { McpServerBuilder } = window.McpServer;

let server = null;

document.getElementById("start-btn").addEventListener("click", async () => {
  const url  = document.getElementById("ws-url").value.trim();
  const name = document.getElementById("server-name").value.trim() || "Babylon Dev Scene";

  log(`Connecting to ${url} …`, "dim");
  setStatus("connecting");

  const builder = new McpServerBuilder()
    .withWsUrl(url)
    .withName(name)
    .withInitializer({
      initialize(_clientInfo, _caps) {
        return {
          protocolVersion: "2024-11-05",
          serverInfo: { name, version: "0.0.0" },
        };
      },
    });

  for (const b of behaviors) {
    builder.withBehavior(b);
  }

  server = builder.build();

  try {
    await server.start();
    for (const b of behaviors) {
      server.attach(null, b);
    }
    setStatus("connected");
    log(`Connected as provider — "${name}"`, "ok");
    log(`Registered ${behaviors.length} behavior(s). Waiting for MCP client…`, "dim");
    document.getElementById("start-btn").disabled = true;
    document.getElementById("stop-btn").disabled  = false;
    document.getElementById("add-mesh-btn").disabled = false;
  } catch (err) {
    setStatus("disconnected");
    log(`Failed to connect: ${err}`, "error");
    server = null;
  }
});

document.getElementById("stop-btn").addEventListener("click", async () => {
  if (!server) return;
  try {
    await server.stop();
    log("Server stopped.", "warn");
  } catch (err) {
    log(`Stop error: ${err}`, "error");
  } finally {
    server = null;
    setStatus("disconnected");
    document.getElementById("start-btn").disabled = false;
    document.getElementById("stop-btn").disabled  = true;
    document.getElementById("add-mesh-btn").disabled = true;
  }
});

// =============================================================================
// Runtime mesh spawning
// =============================================================================

document.getElementById("add-mesh-btn").addEventListener("click", () => {
  if (!server) return;

  const nameInput = document.getElementById("mesh-name-input");
  const meshName  = nameInput.value.trim() || `DynamicMesh_${++dynamicMeshCounter}`;

  // Guard against duplicate URIs
  if (behaviors.some(b => b.namespace === "mesh" && b.attach(null).uri === `mesh://scene/${meshName}`)) {
    log(`Mesh already exists: ${meshName}`, "warn");
    return;
  }

  const newBehavior = makeMeshBehavior(meshName);
  behaviors.push(newBehavior);

  // Register and attach — the server will send notifications/resources/list_changed
  // to the MCP client if a session is already initialized.
  server.registerBehavior(newBehavior);
  server.attach(null, newBehavior);

  renderBehaviors();
  log(`Spawned mesh resource: mesh://scene/${meshName}`, "ok");
  log(`→ notifications/resources/list_changed sent to client (if session ready)`, "dim");

  nameInput.value = "";
});

log("Dev harness ready. Press Start to connect as a Babylon.js provider.", "dim");
</script>
</body>
</html>
